<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/misc/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/misc/favicon-180.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Free Consultation | Network Consultancy</title>
  <meta name="description" content="Contact Network Consultancy today for a free consultation. Fill in our quick form and a specialist will get back to you promptly.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/accessibility.css">
  <style>
    /* ─── Contact Form Page — Figma 698:45525 ───────────────── */
    .ctf-section { padding: 80px var(--px); max-width: var(--section-w); margin: 0 auto; }
    .ctf-inner   { max-width: 1440px; margin: 0 auto; display: flex; flex-direction: column; gap: 44px; }
    /* 2-col header: title left (541px), subtext right (fills rest) */
    .ctf-header  { display: flex; gap: 41px; align-items: flex-start; }
    .ctf-title   { font-family: 'Google Sans Flex', sans-serif; font-weight: 600; font-size: 42px; color: var(--navy); line-height: 1; flex: 0 0 541px; width: 541px; }
    .ctf-sub     { font-family: 'Google Sans Flex', sans-serif; font-weight: 500; font-size: 24px; color: var(--navy); line-height: 30px; flex: 1; }
    /* body: image + form, top-aligned */
    .ctf-body    { display: flex; gap: 45px; align-items: flex-start; }
    .ctf-image   { width: 521px; min-height: 755px; flex-shrink: 0; border-radius: 20px; overflow: hidden; }
    .ctf-image img { width: 100%; height: 100%; object-fit: cover; display: block; min-height: 755px; }
    .ctf-form-panel { background: #859aba; border-radius: 20px; padding: 59px 40px 51px 64px; flex: 1; display: flex; flex-direction: column; }
    .ctf-form { display: flex; flex-direction: column; gap: 30px; width: 100%; }
    .ctf-fields { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .ctf-row  { display: flex; gap: 26px; }
    .ctf-row .ctf-field { flex: 1; min-width: 0; }
    .ctf-field { display: flex; flex-direction: column; }
    .ctf-field--full { width: 100%; }
    .ctf-input, .ctf-select, .ctf-textarea {
      background: #fff;
      border: 0.2px solid #353535;
      border-radius: 10px;
      box-shadow: 0 4px 2px rgba(0,0,0,.1);
      height: 68px;
      padding: 0 23px;
      font-family: 'Google Sans Flex', sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: #353535;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    .ctf-select { background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23353535' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 23px center; padding-right: 48px; }
    .ctf-textarea { height: 138px; resize: vertical; padding: 21px 23px; line-height: 1.5; }
    .ctf-label { font-family: 'Google Sans Flex', sans-serif; font-weight: 400; font-size: 20px; color: #353535; }
    /* Service divider (shown between service sections) */
    .ctf-divider { border: none; border-top: 1px solid rgba(255,255,255,.35); margin: 0; }
    .ctf-service-block { display: flex; flex-direction: column; gap: 30px; }
    .ctf-service-select-wrap { display: flex; flex-direction: column; gap: 16px; }
    /* Add More Services */
    .ctf-add-more { display: flex; gap: 30px; align-items: center; cursor: pointer; }
    .ctf-add-more img { width: 24px; height: 24px; flex-shrink: 0; }
    .ctf-add-more span { font-family: 'Google Sans Flex', sans-serif; font-weight: 400; font-size: 20px; color: #353535; }
    .ctf-btn { background: #353535; color: #fff; border: 1px solid #353535; border-radius: 10px; padding: 12px 24px; font-family: 'Google Sans Flex', sans-serif; font-size: 20px; font-weight: 600; cursor: pointer; transition: background .2s; align-self: flex-start; }
    .ctf-btn:hover { background: #1a1a1a; }
    .ctf-sr-label { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }
    .form-success { display: none; margin-top: 12px; background: #d4edda; color: #155724; padding: 14px 18px; border-radius: 8px; font-family: 'Google Sans Flex', sans-serif; font-size: 15px; }
    .form-error   { display: none; margin-top: 12px; background: #f8d7da; color: #721c24; padding: 14px 18px; border-radius: 8px; font-family: 'Google Sans Flex', sans-serif; font-size: 15px; }
    /* Contact info strip */
    .ctf-info { padding: 40px var(--px) 80px; max-width: var(--section-w); margin: 0 auto; }
    .ctf-info-inner { display: flex; justify-content: space-between; align-items: flex-start; max-width: 1440px; margin: 0 auto; padding-top: 40px; }
    .ctf-info-item { display: flex; flex-direction: column; align-items: center; gap: 28px; }
    .ctf-info-icon { width: 121px; height: 118px; flex-shrink: 0; }
    .ctf-info-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .ctf-info-icon--email { background: #e0e0e0; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .ctf-info-icon--email img { width: 54px; height: 38px; object-fit: contain; }
    .ctf-info-text { text-align: center; display: flex; flex-direction: column; gap: 11px; }
    .ctf-info-label { font-family: 'Google Sans Flex', sans-serif; font-weight: 500; font-size: 32px; color: #060606; line-height: normal; }
    .ctf-info-value { font-family: 'Google Sans Flex', sans-serif; font-weight: 400; font-size: 32px; color: #060606; line-height: normal; }
    .ctf-info-value strong { font-weight: 500; }
    .ctf-info-value a { color: inherit; text-decoration: none; }
    .ctf-info-value a:hover { text-decoration: underline; }
    @media (max-width: 1200px) {
      .ctf-header { flex-direction: column; gap: 20px; }
      .ctf-title  { flex: none; width: auto; font-size: 36px; }
      .ctf-sub    { font-size: 20px; }
      .ctf-image  { width: 380px; min-height: 560px; }
      .ctf-image img { min-height: 560px; }
      .ctf-info-label, .ctf-info-value { font-size: 26px; }
    }
    @media (max-width: 1024px) {
      .ctf-body  { flex-direction: column; align-items: stretch; }
      .ctf-image { width: 100%; min-height: 300px; max-height: 400px; }
      .ctf-image img { min-height: 300px; max-height: 400px; }
      .ctf-info-inner { flex-wrap: wrap; justify-content: center; gap: 48px; }
    }
    @media (max-width: 768px) {
      .ctf-row { flex-direction: column; gap: 16px; }
      .ctf-form-panel { padding: 36px 24px 36px; }
    }
    @media (max-width: 480px) {
      .ctf-title { font-size: 28px; }
      .ctf-info-label, .ctf-info-value { font-size: 22px; }
    }
  </style>

</head>
