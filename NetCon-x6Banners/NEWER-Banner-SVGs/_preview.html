<!DOCTYPE html>
<html><head><style>
body{margin:0;background:#12203f;display:flex;flex-wrap:wrap;font-family:sans-serif;}
div{width:280px;height:280px;margin:8px;border:1px solid #445;position:relative;overflow:hidden;background:#0f1b38;}
div span{position:absolute;top:2px;left:2px;color:#fff;font-size:12px;z-index:2;background:rgba(0,0,0,.6);padding:2px 4px;}
div svg{width:100%;height:100%;display:block;}
</style></head>
<body>
<div class="c" data-file="NetworkConsultancy-x6-Banners-01.svg" data-label="about"><span>about</span></div>
<div class="c" data-file="NetworkConsultancy-x6-Banners-02.svg" data-label="case-studies"><span>case-studies</span></div>
<div class="c" data-file="NetworkConsultancy-x6-Banners_Artboard 3.svg" data-label="solutions"><span>solutions</span></div>
<div class="c" data-file="NetworkConsultancy-x6-Banners_Artboard 4.svg" data-label="industries"><span>industries</span></div>
<div class="c" data-file="NetworkConsultancy-x6-Banners_Artboard 5.svg" data-label="services"><span>services</span></div>
<div class="c" data-file="NetworkConsultancy-x6-Banners_Artboard 6.svg" data-label="blog"><span>blog</span></div>
<script>
async function run() {
  const divs = document.querySelectorAll('.c');
  for (const div of divs) {
    const file = div.dataset.file;
    const res = await fetch(file);
    const text = await res.text();
    const wrap = document.createElement('div');
    wrap.innerHTML = text;
    const svg = wrap.querySelector('svg');
    svg.setAttribute('viewBox', '1180 0 740 700');
    svg.removeAttribute('width');
    svg.removeAttribute('height');
    div.appendChild(svg);
  }
}
run();
</script>
</body></html>
